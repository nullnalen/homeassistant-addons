name: "Finn no Campingvogn"
description: "Addon traverserer finn på jakt etter campingvogner og lagrer historikk i database"
version: "1.4"
slug: "finn_no_campingvogn"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: services
ingress: true
ingress_port: 8101
panel_icon: "mdi:caravan"
ports:
  8101/tcp: 8101
ports_description:
  8101/tcp: "Campingvogn web UI"
options:
