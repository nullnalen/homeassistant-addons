    - "22042"
    - "20003"
    - "20007"
    - "22034"
    - "20061"
    - "20009"
    - "20008"
    - "20002"
  sort: "YEAR_DESC"
  scrape_interval: 6
  vegvesen_api_key: ""
schema:
  databasehost: "str"
